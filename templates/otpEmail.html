<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification – {{OTP_CODE}} is your OTP to login to {{app_name}}</title>
  <style>

    body, table, td, a {
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
    }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; background-color: #f0ede8; font-family: 'DM Sans', Arial, sans-serif; }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f0ede8;">

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
         style="background-color:#f0ede8; padding: 48px 16px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="520"
               style="max-width:520px; background-color:#ffffff; border-radius:16px;
                      box-shadow: 0 4px 32px rgba(0,0,0,0.08); overflow:hidden;">

          <!-- Header band -->
          <tr>
            <td style="background-color:#111111; padding: 36px 48px 32px; text-align:left;">
              <!-- Brand mark -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <span style="font-family:'DM Sans', Arial, sans-serif;
                                 font-size:17px; font-weight:600; color:#ffffff;
                                 letter-spacing:-0.3px;">{{app_name}}</span>
                  </td>
                </tr>
              </table>

              <p style="margin: 24px 0 0; font-family:'DM Sans', Arial, sans-serif;
                         font-size:24px; font-weight:600; color:#ffffff;
                         letter-spacing:-0.5px; line-height:1.3;">
                Verify your identity
              </p>
              <p style="margin: 6px 0 0; font-family:'DM Sans', Arial, sans-serif;
                         font-size:14px; color:#888888; line-height:1.5;">
                Use the code below to complete sign-in
              </p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px 48px 16px;">
              <p style="margin:0 0 8px; font-family:'DM Sans', Arial, sans-serif;
                         font-size:14px; color:#888888; letter-spacing:0.6px;">Hi,</p>
              <p style="margin:0 0 32px; font-family:'DM Sans', Arial, sans-serif;
                         font-size:15px; color:#444444; line-height:1.7;">
                We received a request to authenticate your account.
                Enter the one-time password below to login.
              </p>

              <!-- OTP box -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="background-color:#f7f5f0; border-radius:12px;
                             border: 1.5px solid #e8e4de; padding: 28px 24px;
                             text-align:center;">
                    <p style="margin:0 0 6px; font-family:'DM Sans', Arial, sans-serif;
                               font-size:11px; color:#aaaaaa; letter-spacing:1.2px;
                               text-transform:uppercase;">One-Time Password</p>
                    <p style="margin:0; font-family:'DM Mono', 'Courier New', monospace;
                               font-size:40px; font-weight:500; color:#111111;
                               letter-spacing:10px; line-height:1.2;">
                      {{OTP_CODE}}
                    </p>
                  </td>
                </tr>
              </table>

              <!-- Warning -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%"
                     style="margin-top: 20px;">
                <tr>
                  <td style="background-color:#fff8e6; border-left: 3px solid #f5c842;
                             border-radius: 0 8px 8px 0; padding: 14px 16px;">
                    <p style="margin:0; font-family:'DM Sans', Arial, sans-serif;
                               font-size:13px; color:#7a6200; line-height:1.6;">
                      🔒 <strong>Never share this code.</strong>
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 28px 48px 0;">
              <hr style="border:none; border-top: 1px solid #eeebe6; margin:0;" />
            </td>
          </tr>

          <!-- Footer -->
        
        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>

</body>
</html>
